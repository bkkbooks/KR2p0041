body:
  text: 與聞之夫季氏河東之盛家也亦以行矣為之宗誨汝季桓使仲弓為宰仲弓以告孔子曰季氏使雍也從於宰夫之後雍也憧愚恐貽吾子羞愿因吾子而辭孔子曰雍汝夫子有臣萬人導汝使老其家夫仲弓曰敢問為政何先老老慈幼先有司舉賢才宥過舉罪罪政之始也仲弓曰若夫老老老老慈幼既聞命矣夫先有司為之如何仲尼曰夫民安舊而重遷造變不行委蛇有成是故有司不可不先也仲弓曰雍也不敏雖有賢才弗知舉也敢問舉才如之何仲尼夫賢才不可弇也舉爾所知爾所不知人其舍之者仲弓曰宥過赦罪則民何後仲尼曰山有崩川有竭日月星辰猶差民亡不有過賢者仲弓曰敢問民務孔子曰善哉問乎足以教矣君毋自惰也昔三代之明王有四海之內猶徠雍汝知者之仲弓答曰雍也弗聞也孔子曰夫祭至敬之本也所以立生也不可不慎也夫喪至愛之卒也所以成死也不可不慎也夫行巽求學刑政不緩德教不倦仲弓曰若此三者聞命矣敢問道民興德如何孔子曰申之服之緩弛而遜力之雖有愆德其也廢不及其成獨主厭人難為從正孔子曰雍古之事君者以忠與敬雖其難也汝惟以上下相報以忠則民歡承教害者不之一日以善蒞所教皆終一日以不善蒞所教皆崩可不慎乎仲弓曰今之君子使人不盡其悅其咎仲弓曰今之君子愎過捍析難以納諫孔子曰今之君宜順之至者教而使之君子亡所厭人今汝相夫子所竭其情盡其慎者三害近務矣
